version: 2

# =============================================================================
# DATA CONTRACTS — Capa Azure Fabric (az_)
#
# Una tabla az_ por cada tabla raw. Contratos visados para produccion.
# PII: NUNCA se exponen campos en claro — solo hashes SHA2_256.
# Materializacion: incremental/merge con CDC via _raw_hash (excepto az_orders).
#
# Mapa raw -> az_:
#   raw_crm.customers     -> az_customers
#   raw_crm.addresses     -> az_addresses
#   raw_erp.order_headers -> az_order_headers
#   raw_erp.order_details -> az_order_details
#   raw_erp.products      -> az_products
#   raw_hr.employees      -> az_employees
#   raw_hr.departments    -> az_departments
#   (tabla analitica)     -> az_orders
#
# Para recuperar PII desde Azure usar los vaults locales:
#   int_pii_vault_customers  (customer_sk / customer_id)
#   int_pii_vault_employees  (employee_sk / business_entity_id)
#
# Ver doc("cdc_pattern") y doc("pii_strategy") para patrones completos.
# =============================================================================

models:

  # ---------------------------------------------------------------------------
  # az_customers
  # ---------------------------------------------------------------------------
  - name: az_customers
    description: '{{ doc("az_customers") }}'
    meta:
      owner: data-engineering
      source_raw: raw_crm.customers
      pii_free: true
      contract_status: visado
      pii_vault: int_pii_vault_customers
    columns:
      - name: customer_sk
        description: '{{ doc("col_customer_sk") }}'
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Clave de negocio del cliente (sistema CRM)"
        tests:
          - not_null
          - unique
      - name: account_number
        description: "Numero de cuenta del cliente en el CRM"
        tests:
          - not_null
      - name: person_id
        description: "FK a persona en el sistema fuente (nulo para cuentas corporativas)"
      - name: store_id
        description: "FK a tienda asociada (nulo para clientes individuales)"
      - name: territory_id
        description: "FK a territorio de ventas"
      - name: full_name_hash
        description: '{{ doc("col_pii_hash_name") }}'
        tests:
          - not_null
        meta:
          pii: false
          original_field: name
          hash_algorithm: SHA2_256
      - name: email_address_hash
        description: '{{ doc("col_pii_hash_email") }}'
        tests:
          - not_null
        meta:
          pii: false
          original_field: email_address
          hash_algorithm: SHA2_256
      - name: phone_hash
        description: '{{ doc("col_pii_hash_phone") }}'
        meta:
          pii: false
          original_field: phone
          hash_algorithm: SHA2_256
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
        tests:
          - not_null
      - name: _source_entity
        description: '{{ doc("col_source_entity") }}'
      - name: _pipeline_name
        description: '{{ doc("col_pipeline_name") }}'
      - name: _batch_id
        description: '{{ doc("col_batch_id") }}'
      - name: _raw_hash
        description: '{{ doc("col_raw_hash") }}'
        tests:
          - not_null
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  # az_addresses
  # ---------------------------------------------------------------------------
  - name: az_addresses
    description: '{{ doc("az_addresses") }}'
    meta:
      owner: data-engineering
      source_raw: raw_crm.addresses
      pii_free: true
      contract_status: visado
    columns:
      - name: address_id
        description: "Clave primaria de la direccion"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Clave de negocio del cliente — FK a az_customers"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('az_customers')
                field: customer_id
              config:
                severity: warn
      - name: customer_sk
        description: '{{ doc("col_customer_sk") }}'
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('az_customers')
                field: customer_sk
              config:
                severity: warn
      - name: state_province_id
        description: "FK a estado o provincia"
      - name: address_line1_hash
        description: '{{ doc("col_address_hash_line1") }}'
        tests:
          - not_null
        meta:
          pii: false
          original_field: address_line1
          hash_algorithm: SHA2_256
      - name: address_line2_hash
        description: '{{ doc("col_address_hash_line2") }}'
        meta:
          pii: false
          original_field: address_line2
          hash_algorithm: SHA2_256
      - name: city
        description: "Ciudad — dato geografico, no PII"
        tests:
          - not_null
      - name: postal_code
        description: "Codigo postal"
      - name: country_region
        description: "Pais o region"
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
        tests:
          - not_null
      - name: _source_entity
        description: '{{ doc("col_source_entity") }}'
      - name: _pipeline_name
        description: '{{ doc("col_pipeline_name") }}'
      - name: _batch_id
        description: '{{ doc("col_batch_id") }}'
      - name: _raw_hash
        description: '{{ doc("col_raw_hash") }}'
        tests:
          - not_null
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  # az_order_headers
  # ---------------------------------------------------------------------------
  - name: az_order_headers
    description: '{{ doc("az_order_headers") }}'
    meta:
      owner: data-engineering
      source_raw: raw_erp.order_headers
      pii_free: true
      contract_status: visado
    columns:
      - name: sales_order_id
        description: "Clave primaria de la orden — FK desde az_order_details"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Clave de negocio del cliente — FK a az_customers"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('az_customers')
                field: customer_id
              config:
                severity: warn
      - name: customer_sk
        description: '{{ doc("col_customer_sk") }}'
        tests:
          - relationships:
              arguments:
                to: ref('az_customers')
                field: customer_sk
              config:
                severity: warn
      - name: sales_person_id
        description: "FK al vendedor asignado"
      - name: territory_id
        description: "FK al territorio de ventas"
      - name: revision_number
        description: "Numero de revision de la orden"
      - name: sales_order_number
        description: "Numero de orden en formato legible"
        tests:
          - not_null
      - name: purchase_order_number
        description: "Numero de orden de compra del cliente"
      - name: account_number
        description: "Numero de cuenta asociado a la orden"
      - name: order_date
        description: "Fecha en que se realizo la orden"
        tests:
          - not_null
      - name: due_date
        description: "Fecha de vencimiento comprometida"
      - name: ship_date
        description: "Fecha real de envio"
      - name: status
        description: "Estado: 1=In Process, 2=Approved, 3=Backordered, 4=Rejected, 5=Shipped, 6=Cancelled"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5, 6]
              config:
                severity: error
      - name: online_order_flag
        description: "1=orden online, 0=presencial"
      - name: sub_total
        description: "Subtotal antes de impuestos y flete"
        tests:
          - not_null
      - name: tax_amt
        description: "Monto de impuesto"
      - name: freight
        description: "Costo de flete"
      - name: total_due
        description: "Total a pagar: sub_total + tax_amt + freight"
        tests:
          - not_null
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
        tests:
          - not_null
      - name: _source_entity
        description: '{{ doc("col_source_entity") }}'
      - name: _pipeline_name
        description: '{{ doc("col_pipeline_name") }}'
      - name: _batch_id
        description: '{{ doc("col_batch_id") }}'
      - name: _raw_hash
        description: '{{ doc("col_raw_hash") }}'
        tests:
          - not_null
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  # az_order_details
  # ---------------------------------------------------------------------------
  - name: az_order_details
    description: '{{ doc("az_order_details") }}'
    meta:
      owner: data-engineering
      source_raw: raw_erp.order_details
      pii_free: true
      contract_status: visado
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sales_order_id
              - sales_order_detail_id
    columns:
      - name: sales_order_id
        description: "FK a la cabecera de orden — FK a az_order_headers (parte de PK compuesta)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('az_order_headers')
                field: sales_order_id
              config:
                severity: error
      - name: sales_order_detail_id
        description: "Identificador de la linea dentro de la orden (parte de PK compuesta)"
        tests:
          - not_null
      - name: product_id
        description: "FK al producto — FK a az_products"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('az_products')
                field: product_id
              config:
                severity: warn
      - name: special_offer_id
        description: "FK a oferta especial aplicada (0 si no hay oferta)"
      - name: carrier_tracking_number
        description: "Numero de tracking del transportista"
      - name: order_qty
        description: "Cantidad de unidades ordenadas"
        tests:
          - not_null
      - name: unit_price
        description: "Precio unitario sin descuento"
        tests:
          - not_null
      - name: unit_price_discount
        description: "Porcentaje de descuento (0.0 a 1.0)"
      - name: line_total
        description: "Total de la linea calculado por el sistema fuente"
        tests:
          - not_null
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
        tests:
          - not_null
      - name: _source_entity
        description: '{{ doc("col_source_entity") }}'
      - name: _pipeline_name
        description: '{{ doc("col_pipeline_name") }}'
      - name: _batch_id
        description: '{{ doc("col_batch_id") }}'
      - name: _raw_hash
        description: '{{ doc("col_raw_hash") }}'
        tests:
          - not_null
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  # az_products
  # ---------------------------------------------------------------------------
  - name: az_products
    description: '{{ doc("az_products") }}'
    meta:
      owner: data-engineering
      source_raw: raw_erp.products
      pii_free: true
      contract_status: visado
    columns:
      - name: product_id
        description: "Clave primaria del producto — FK desde az_order_details"
        tests:
          - not_null
          - unique
      - name: product_number
        description: "Codigo alfanumerico del producto (ej. BK-R93R-62)"
        tests:
          - not_null
      - name: product_name
        description: "Nombre descriptivo del producto"
        tests:
          - not_null
      - name: standard_cost
        description: "Costo estandar de fabricacion o adquisicion"
      - name: list_price
        description: "Precio de lista al publico (0 si es componente sin precio de venta)"
      - name: finished_goods_flag
        description: "1=producto terminado para venta, 0=componente o materia prima"
      - name: color
        description: "Color del producto (nulo si no aplica)"
      - name: size
        description: "Talla o tamano del producto (nulo si no aplica)"
      - name: weight
        description: "Peso del producto (nulo si no aplica)"
      - name: safety_stock_level
        description: "Nivel minimo de stock de seguridad antes de activar reabastecimiento"
      - name: reorder_point
        description: "Punto de inventario en que se genera una orden de reabastecimiento"
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
        tests:
          - not_null
      - name: _source_entity
        description: '{{ doc("col_source_entity") }}'
      - name: _pipeline_name
        description: '{{ doc("col_pipeline_name") }}'
      - name: _batch_id
        description: '{{ doc("col_batch_id") }}'
      - name: _raw_hash
        description: '{{ doc("col_raw_hash") }}'
        tests:
          - not_null
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  # az_employees
  # ---------------------------------------------------------------------------
  - name: az_employees
    description: '{{ doc("az_employees") }}'
    meta:
      owner: data-engineering
      source_raw: raw_hr.employees
      pii_free: true
      contract_status: visado
      pii_vault: int_pii_vault_employees
    columns:
      - name: employee_sk
        description: '{{ doc("col_employee_sk") }}'
        tests:
          - not_null
          - unique
      - name: business_entity_id
        description: "Clave de negocio del empleado (sistema RRHH)"
        tests:
          - not_null
          - unique
      - name: national_id_hash
        description: '{{ doc("col_pii_hash_national_id") }}'
        tests:
          - not_null
        meta:
          pii: false
          original_field: national_id_number
          hash_algorithm: SHA2_256
      - name: login_id_hash
        description: '{{ doc("col_pii_hash_login") }}'
        tests:
          - not_null
        meta:
          pii: false
          original_field: login_id
          hash_algorithm: SHA2_256
      - name: birth_date_hash
        description: '{{ doc("col_pii_hash_birth_date") }}'
        tests:
          - not_null
        meta:
          pii: false
          original_field: birth_date
          hash_algorithm: SHA2_256
      - name: job_title
        description: "Titulo del cargo (no PII)"
        tests:
          - not_null
      - name: marital_status
        description: "Estado civil: M=Married, S=Single"
        tests:
          - accepted_values:
              arguments:
                values: ['M', 'S']
              config:
                severity: warn
      - name: gender
        description: "Genero: M=Male, F=Female"
        tests:
          - accepted_values:
              arguments:
                values: ['M', 'F']
              config:
                severity: warn
      - name: hire_date
        description: "Fecha de contratacion"
        tests:
          - not_null
      - name: salaried_flag
        description: "1=asalariado, 0=por horas"
      - name: vacation_hours
        description: "Horas de vacaciones disponibles"
      - name: sick_leave_hours
        description: "Horas de licencia por enfermedad disponibles"
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
        tests:
          - not_null
      - name: _pipeline_name
        description: '{{ doc("col_pipeline_name") }}'
      - name: _batch_id
        description: '{{ doc("col_batch_id") }}'
      - name: _raw_hash
        description: '{{ doc("col_raw_hash") }}'
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  # az_departments
  # ---------------------------------------------------------------------------
  - name: az_departments
    description: '{{ doc("az_departments") }}'
    meta:
      owner: data-engineering
      source_raw: raw_hr.departments
      pii_free: true
      contract_status: visado
    columns:
      - name: department_id
        description: "Clave primaria del departamento"
        tests:
          - not_null
          - unique
      - name: department_name
        description: "Nombre del departamento (renombrado desde 'name' de staging)"
        tests:
          - not_null
      - name: department_group
        description: "Grupo funcional del departamento (renombrado desde 'group_name' de staging)"
        tests:
          - not_null
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
        tests:
          - not_null
      - name: _source_entity
        description: '{{ doc("col_source_entity") }}'
      - name: _pipeline_name
        description: '{{ doc("col_pipeline_name") }}'
      - name: _batch_id
        description: '{{ doc("col_batch_id") }}'
      - name: _raw_hash
        description: '{{ doc("col_raw_hash") }}'
        tests:
          - not_null
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  # az_orders
  # ---------------------------------------------------------------------------
  - name: az_orders
    description: '{{ doc("az_orders") }}'
    meta:
      owner: data-engineering
      source_raw: raw_erp.order_headers + raw_erp.order_details
      pii_free: true
      contract_status: visado
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sales_order_id
              - sales_order_detail_id
    columns:
      - name: sales_order_id
        description: "Identificador de la cabecera de orden"
        tests:
          - not_null
      - name: sales_order_detail_id
        description: "Identificador de la linea de detalle"
        tests:
          - not_null
      - name: sales_order_number
        description: "Numero de orden en formato legible"
        tests:
          - not_null
      - name: customer_sk
        description: '{{ doc("col_customer_sk") }}'
        tests:
          - relationships:
              arguments:
                to: ref('az_customers')
                field: customer_sk
              config:
                severity: warn
      - name: order_date
        description: "Fecha de la orden"
        tests:
          - not_null
      - name: due_date
        description: "Fecha de vencimiento comprometida"
      - name: ship_date
        description: "Fecha real de envio"
      - name: status
        description: "Estado de la orden: 1=In Process, 2=Approved, 3=Backordered, 4=Rejected, 5=Shipped, 6=Cancelled"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5, 6]
              config:
                severity: error
      - name: online_order_flag
        description: "1=online, 0=presencial"
      - name: product_id
        description: "FK al producto — FK a az_products"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('az_products')
                field: product_id
              config:
                severity: warn
      - name: order_qty
        description: "Cantidad de unidades ordenadas"
        tests:
          - not_null
      - name: unit_price
        description: "Precio unitario sin descuento"
        tests:
          - not_null
      - name: unit_price_discount
        description: "Porcentaje de descuento (0.0 a 1.0)"
      - name: line_total
        description: "Total de linea del sistema fuente"
        tests:
          - not_null
      - name: line_total_net
        description: "Total neto calculado: order_qty x unit_price x (1 - unit_price_discount)"
      - name: discount_amount
        description: "Monto de descuento aplicado en la linea"
      - name: sub_total
        description: "Subtotal de la orden (de cabecera)"
        tests:
          - not_null
      - name: total_due
        description: "Total a cobrar incluyendo impuestos y flete"
        tests:
          - not_null
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
        tests:
          - not_null
      - name: _pipeline_name
        description: '{{ doc("col_pipeline_name") }}'
      - name: _batch_id
        description: '{{ doc("col_batch_id") }}'
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null
