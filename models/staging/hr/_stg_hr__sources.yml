version: 2

sources:
  - name: raw_hr
    description: '{{ doc("src_raw_hr") }}'
    database: dbt_cibao_raw
    schema: raw_hr
    tables:

      - name: employees
        description: '{{ doc("src_raw_hr_employees") }}'
        freshness:
          warn_after: { count: 1, period: day }
          error_after: { count: 3, period: day }
        loaded_at_field: _ingested_at
        columns:
          - name: business_entity_id
            description: "Identificador único del empleado"
          - name: national_id_number
            description: "Número de identificación nacional — PII"
            meta:
              pii: true
          - name: login_id
            description: "Login de dominio — PII"
            meta:
              pii: true
          - name: job_title
            description: "Título del cargo"
          - name: birth_date
            description: "Fecha de nacimiento — PII"
            meta:
              pii: true
          - name: marital_status
            description: "Estado civil (M=Married, S=Single)"
          - name: gender
            description: "Género (M=Male, F=Female)"
          - name: hire_date
            description: "Fecha de contratación"
          - name: salaried_flag
            description: "1=asalariado, 0=por horas"
          - name: vacation_hours
            description: "Horas de vacaciones acumuladas"
          - name: sick_leave_hours
            description: "Horas de licencia por enfermedad acumuladas"
          - name: _ingested_at
            description: '{{ doc("col_ingested_at") }}'
          - name: _is_deleted
            description: '{{ doc("col_is_deleted") }}'

      - name: departments
        description: '{{ doc("src_raw_hr_departments") }}'
        freshness:
          warn_after: { count: 7, period: day }
          error_after: { count: 30, period: day }
        loaded_at_field: _ingested_at
        columns:
          - name: department_id
            description: "Identificador único del departamento"
          - name: name
            description: "Nombre del departamento"
          - name: group_name
            description: "Grupo funcional del departamento"
          - name: _ingested_at
            description: '{{ doc("col_ingested_at") }}'
          - name: _is_deleted
            description: '{{ doc("col_is_deleted") }}'
