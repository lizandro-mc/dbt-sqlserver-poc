version: 2

sources:
  - name: raw_crm
    description: '{{ doc("src_raw_crm") }}'
    database: dbt_cibao_raw
    schema: raw_crm
    tables:

      - name: customers
        description: '{{ doc("src_raw_crm_customers") }}'
        freshness:
          warn_after: { count: 1, period: day }
          error_after: { count: 3, period: day }
        loaded_at_field: _ingested_at
        columns:
          - name: customer_id
            description: "Identificador único del cliente"
            tests:
              - not_null
              - unique
          - name: person_id
            description: "FK a persona (clientes individuales)"
          - name: store_id
            description: "FK a tienda (clientes corporativos)"
          - name: territory_id
            description: "FK a territorio de ventas"
          - name: account_number
            description: "Número de cuenta en el CRM"
          - name: name
            description: "Nombre del cliente — PII"
            meta:
              pii: true
          - name: email_address
            description: "Email del cliente — PII"
            meta:
              pii: true
          - name: phone
            description: "Teléfono del cliente — PII"
            meta:
              pii: true
          - name: _ingested_at
            description: '{{ doc("col_ingested_at") }}'
          - name: _source_system
            description: '{{ doc("col_source_system") }}'
          - name: _source_entity
            description: '{{ doc("col_source_entity") }}'
          - name: _pipeline_name
            description: '{{ doc("col_pipeline_name") }}'
          - name: _batch_id
            description: '{{ doc("col_batch_id") }}'
          - name: _raw_hash
            description: '{{ doc("col_raw_hash") }}'
          - name: _is_deleted
            description: '{{ doc("col_is_deleted") }}'

      - name: addresses
        description: '{{ doc("src_raw_crm_addresses") }}'
        freshness:
          warn_after: { count: 1, period: day }
          error_after: { count: 3, period: day }
        loaded_at_field: _ingested_at
        columns:
          - name: address_id
            description: "Identificador único de la dirección"
            tests:
              - not_null
              - unique
          - name: customer_id
            description: "FK al cliente"
          - name: address_line1
            description: "Primera línea de dirección — PII"
            meta:
              pii: true
          - name: address_line2
            description: "Segunda línea de dirección — PII (opcional)"
            meta:
              pii: true
          - name: city
            description: "Ciudad"
          - name: state_province_id
            description: "FK a estado/provincia"
          - name: postal_code
            description: "Código postal"
          - name: country_region
            description: "País o región"
          - name: _ingested_at
            description: '{{ doc("col_ingested_at") }}'
          - name: _is_deleted
            description: '{{ doc("col_is_deleted") }}'
