version: 2

sources:
  - name: raw_erp
    description: '{{ doc("src_raw_erp") }}'
    database: dbt_cibao_raw
    schema: raw_erp
    tables:

      - name: order_headers
        description: '{{ doc("src_raw_erp_order_headers") }}'
        freshness:
          warn_after: { count: 1, period: day }
          error_after: { count: 3, period: day }
        loaded_at_field: _ingested_at
        columns:
          - name: sales_order_id
            description: "Identificador único de la orden de venta"
          - name: revision_number
            description: "Número de revisión de la orden"
          - name: order_date
            description: "Fecha de la orden"
          - name: due_date
            description: "Fecha de vencimiento comprometida"
          - name: ship_date
            description: "Fecha de envío"
          - name: status
            description: "Estado: 1=In Process, 2=Approved, 3=Backordered, 4=Rejected, 5=Shipped, 6=Cancelled"
          - name: online_order_flag
            description: "1=orden online, 0=presencial"
          - name: sales_order_number
            description: "Número de orden en formato legible"
          - name: purchase_order_number
            description: "Número de orden de compra del cliente"
          - name: account_number
            description: "Número de cuenta"
          - name: customer_id
            description: "FK al cliente"
          - name: sales_person_id
            description: "FK al vendedor"
          - name: territory_id
            description: "FK al territorio de ventas"
          - name: sub_total
            description: "Subtotal antes de impuestos y flete"
          - name: tax_amt
            description: "Monto de impuesto"
          - name: freight
            description: "Costo de flete"
          - name: total_due
            description: "Total a pagar (sub_total + tax_amt + freight)"
          - name: _ingested_at
            description: '{{ doc("col_ingested_at") }}'
          - name: _is_deleted
            description: '{{ doc("col_is_deleted") }}'

      - name: order_details
        description: '{{ doc("src_raw_erp_order_details") }}'
        freshness:
          warn_after: { count: 1, period: day }
          error_after: { count: 3, period: day }
        loaded_at_field: _ingested_at
        columns:
          - name: sales_order_id
            description: "FK a la cabecera de orden"
          - name: sales_order_detail_id
            description: "Identificador de la línea dentro de la orden"
          - name: carrier_tracking_number
            description: "Número de tracking del transportista"
          - name: order_qty
            description: "Cantidad ordenada"
          - name: product_id
            description: "FK al producto"
          - name: special_offer_id
            description: "FK a oferta especial aplicada (0 = sin oferta)"
          - name: unit_price
            description: "Precio unitario"
          - name: unit_price_discount
            description: "Descuento aplicado (0.0 a 1.0)"
          - name: line_total
            description: "Total de línea = qty × price × (1 - discount)"
          - name: _ingested_at
            description: '{{ doc("col_ingested_at") }}'
          - name: _is_deleted
            description: '{{ doc("col_is_deleted") }}'

      - name: products
        description: '{{ doc("src_raw_erp_products") }}'
        freshness:
          warn_after: { count: 7, period: day }
          error_after: { count: 30, period: day }
        loaded_at_field: _ingested_at
        columns:
          - name: product_id
            description: "Identificador único del producto"
          - name: product_number
            description: "Código alfanumérico del producto"
          - name: product_name
            description: "Nombre del producto"
          - name: standard_cost
            description: "Costo estándar de producción"
          - name: list_price
            description: "Precio de lista"
          - name: finished_goods_flag
            description: "1=producto terminado, 0=componente"
          - name: color
            description: "Color del producto"
          - name: safety_stock_level
            description: "Nivel mínimo de stock de seguridad"
          - name: reorder_point
            description: "Punto de reorden"
          - name: size
            description: "Talla o tamaño"
          - name: weight
            description: "Peso del producto"
          - name: _ingested_at
            description: '{{ doc("col_ingested_at") }}'
          - name: _is_deleted
            description: '{{ doc("col_is_deleted") }}'
