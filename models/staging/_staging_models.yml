version: 2

models:

  # ---------------------------------------------------------------------------
  # CRM
  # ---------------------------------------------------------------------------

  - name: stg_crm__customers
    description: '{{ doc("stg_crm__customers") }}'
    meta:
      owner: data-engineering
      source_raw: raw_crm.customers
      contains_pii: true
      pii_fields: [name, email_address, phone]
    columns:
      - name: customer_id
        description: "Identificador único del cliente (PK)"
        tests:
          - not_null
          - unique
      - name: person_id
        description: "FK a persona en el sistema fuente (nulo para cuentas corporativas)"
      - name: store_id
        description: "FK a tienda asociada (nulo para clientes individuales)"
      - name: territory_id
        description: "FK a territorio de ventas"
      - name: account_number
        description: "Número de cuenta del cliente en el sistema CRM"
        tests:
          - not_null
      - name: name
        description: "Nombre completo del cliente — campo PII, solo en SQL Server local"
        tests:
          - not_null
        meta:
          pii: true
      - name: email_address
        description: "Dirección de correo electrónico — campo PII"
        meta:
          pii: true
      - name: phone
        description: "Teléfono de contacto — campo PII"
        meta:
          pii: true
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
      - name: _source_entity
        description: '{{ doc("col_source_entity") }}'
      - name: _pipeline_name
        description: '{{ doc("col_pipeline_name") }}'
      - name: _batch_id
        description: '{{ doc("col_batch_id") }}'
      - name: _raw_hash
        description: '{{ doc("col_raw_hash") }}'
      - name: _is_deleted
        description: '{{ doc("col_is_deleted") }}'
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null

  - name: stg_crm__addresses
    description: '{{ doc("stg_crm__addresses") }}'
    meta:
      owner: data-engineering
      source_raw: raw_crm.addresses
      contains_pii: true
      pii_fields: [address_line1, address_line2]
    columns:
      - name: address_id
        description: "Identificador único de la dirección (PK)"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "FK al cliente propietario de la dirección"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_crm__customers')
                field: customer_id
              config:
                severity: warn
      - name: address_line1
        description: "Primera línea de la dirección — campo PII (domicilio físico)"
        tests:
          - not_null
        meta:
          pii: true
      - name: address_line2
        description: "Segunda línea de la dirección — campo PII (puede ser nula)"
        meta:
          pii: true
      - name: city
        description: "Ciudad — dato geográfico, no PII"
        tests:
          - not_null
      - name: state_province_id
        description: "FK a estado o provincia"
      - name: postal_code
        description: "Código postal"
      - name: country_region
        description: "País o región"
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
      - name: _source_entity
        description: '{{ doc("col_source_entity") }}'
      - name: _pipeline_name
        description: '{{ doc("col_pipeline_name") }}'
      - name: _batch_id
        description: '{{ doc("col_batch_id") }}'
      - name: _raw_hash
        description: '{{ doc("col_raw_hash") }}'
      - name: _is_deleted
        description: '{{ doc("col_is_deleted") }}'
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  # ERP
  # ---------------------------------------------------------------------------

  - name: stg_erp__order_headers
    description: '{{ doc("stg_erp__order_headers") }}'
    meta:
      owner: data-engineering
      source_raw: raw_erp.order_headers
      contains_pii: false
    columns:
      - name: sales_order_id
        description: "Identificador único de la orden de venta (PK)"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "FK al cliente — clave entera de sistema, no PII"
        tests:
          - not_null
      - name: sales_person_id
        description: "FK al vendedor asignado (puede ser nulo para órdenes online)"
      - name: territory_id
        description: "FK al territorio de ventas"
      - name: revision_number
        description: "Número de revisión de la orden (se incrementa con cada modificación)"
      - name: sales_order_number
        description: "Número de orden en formato legible (ej. SO43659)"
      - name: purchase_order_number
        description: "Número de orden de compra proporcionado por el cliente"
      - name: account_number
        description: "Número de cuenta asociado a la orden"
      - name: order_date
        description: "Fecha en que se realizó la orden"
        tests:
          - not_null
      - name: due_date
        description: "Fecha de vencimiento comprometida con el cliente"
      - name: ship_date
        description: "Fecha real de envío (nula si aún no se envió)"
      - name: status
        description: "Estado de la orden: 1=In Process, 2=Approved, 3=Backordered, 4=Rejected, 5=Shipped, 6=Cancelled"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5, 6]
              config:
                severity: warn
      - name: online_order_flag
        description: "1 si la orden fue realizada en línea; 0 si fue presencial"
      - name: sub_total
        description: "Subtotal de la orden antes de impuestos y flete"
        tests:
          - not_null
      - name: tax_amt
        description: "Monto de impuesto calculado"
      - name: freight
        description: "Costo de flete"
      - name: total_due
        description: "Total a cobrar: sub_total + tax_amt + freight"
        tests:
          - not_null
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
      - name: _source_entity
        description: '{{ doc("col_source_entity") }}'
      - name: _pipeline_name
        description: '{{ doc("col_pipeline_name") }}'
      - name: _batch_id
        description: '{{ doc("col_batch_id") }}'
      - name: _raw_hash
        description: '{{ doc("col_raw_hash") }}'
      - name: _is_deleted
        description: '{{ doc("col_is_deleted") }}'
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null

  - name: stg_erp__order_details
    description: '{{ doc("stg_erp__order_details") }}'
    meta:
      owner: data-engineering
      source_raw: raw_erp.order_details
      contains_pii: false
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - sales_order_id
              - sales_order_detail_id
    columns:
      - name: sales_order_id
        description: "FK a la cabecera de orden (parte de la clave compuesta)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_erp__order_headers')
                field: sales_order_id
              config:
                severity: error
      - name: sales_order_detail_id
        description: "Identificador de la línea dentro de la orden (parte de la clave compuesta)"
        tests:
          - not_null
      - name: product_id
        description: "FK al producto"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_erp__products')
                field: product_id
              config:
                severity: warn
      - name: special_offer_id
        description: "FK a la oferta especial aplicada (0 si no hay oferta)"
      - name: carrier_tracking_number
        description: "Número de tracking del transportista (nulo antes del envío)"
      - name: order_qty
        description: "Cantidad de unidades ordenadas para este producto"
        tests:
          - not_null
      - name: unit_price
        description: "Precio unitario del producto en esta orden"
        tests:
          - not_null
      - name: unit_price_discount
        description: "Porcentaje de descuento sobre el precio unitario (0.0 a 1.0)"
      - name: line_total
        description: "Total de la línea: order_qty × unit_price × (1 - unit_price_discount)"
        tests:
          - not_null
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
      - name: _source_entity
        description: '{{ doc("col_source_entity") }}'
      - name: _pipeline_name
        description: '{{ doc("col_pipeline_name") }}'
      - name: _batch_id
        description: '{{ doc("col_batch_id") }}'
      - name: _raw_hash
        description: '{{ doc("col_raw_hash") }}'
      - name: _is_deleted
        description: '{{ doc("col_is_deleted") }}'
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null

  - name: stg_erp__products
    description: '{{ doc("stg_erp__products") }}'
    meta:
      owner: data-engineering
      source_raw: raw_erp.products
      contains_pii: false
    columns:
      - name: product_id
        description: "Identificador único del producto (PK)"
        tests:
          - not_null
          - unique
      - name: product_number
        description: "Código alfanumérico del producto (ej. BK-R93R-62)"
        tests:
          - not_null
      - name: product_name
        description: "Nombre descriptivo del producto"
        tests:
          - not_null
      - name: standard_cost
        description: "Costo estándar de fabricación o adquisición"
      - name: list_price
        description: "Precio de lista al público (0 si es componente sin precio de venta)"
      - name: finished_goods_flag
        description: "1 si es producto terminado para venta; 0 si es componente o materia prima"
      - name: color
        description: "Color del producto (nulo si no aplica)"
      - name: size
        description: "Talla o tamaño del producto (nulo si no aplica)"
      - name: weight
        description: "Peso del producto en la unidad definida por el sistema fuente (nulo si no aplica)"
      - name: safety_stock_level
        description: "Nivel mínimo de stock de seguridad antes de activar reabastecimiento"
      - name: reorder_point
        description: "Punto de inventario en que se genera una orden de reabastecimiento"
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
      - name: _source_entity
        description: '{{ doc("col_source_entity") }}'
      - name: _pipeline_name
        description: '{{ doc("col_pipeline_name") }}'
      - name: _batch_id
        description: '{{ doc("col_batch_id") }}'
      - name: _raw_hash
        description: '{{ doc("col_raw_hash") }}'
      - name: _is_deleted
        description: '{{ doc("col_is_deleted") }}'
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  # HR
  # ---------------------------------------------------------------------------

  - name: stg_hr__employees
    description: '{{ doc("stg_hr__employees") }}'
    meta:
      owner: data-engineering
      source_raw: raw_hr.employees
      contains_pii: true
      pii_fields: [national_id_number, login_id, birth_date]
    columns:
      - name: business_entity_id
        description: "Identificador único del empleado (PK)"
        tests:
          - not_null
          - unique
      - name: national_id_number
        description: "Número de identificación nacional — campo PII"
        tests:
          - not_null
        meta:
          pii: true
      - name: login_id
        description: "Identificador de login en el dominio (ej. adventure-works\\\\jdoe) — campo PII"
        meta:
          pii: true
      - name: job_title
        description: "Título del cargo del empleado"
        tests:
          - not_null
      - name: birth_date
        description: "Fecha de nacimiento — campo PII"
        meta:
          pii: true
      - name: marital_status
        description: "Estado civil: M=Married, S=Single"
        tests:
          - accepted_values:
              arguments:
                values: ['M', 'S']
              config:
                severity: warn
      - name: gender
        description: "Género: M=Male, F=Female"
        tests:
          - accepted_values:
              arguments:
                values: ['M', 'F']
              config:
                severity: warn
      - name: hire_date
        description: "Fecha de contratación del empleado"
        tests:
          - not_null
      - name: salaried_flag
        description: "1 si el empleado es asalariado; 0 si cobra por horas"
      - name: vacation_hours
        description: "Horas de vacaciones disponibles acumuladas"
      - name: sick_leave_hours
        description: "Horas de licencia por enfermedad disponibles acumuladas"
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
      - name: _source_entity
        description: '{{ doc("col_source_entity") }}'
      - name: _pipeline_name
        description: '{{ doc("col_pipeline_name") }}'
      - name: _batch_id
        description: '{{ doc("col_batch_id") }}'
      - name: _raw_hash
        description: '{{ doc("col_raw_hash") }}'
      - name: _is_deleted
        description: '{{ doc("col_is_deleted") }}'
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null

  - name: stg_hr__departments
    description: '{{ doc("stg_hr__departments") }}'
    meta:
      owner: data-engineering
      source_raw: raw_hr.departments
      contains_pii: false
    columns:
      - name: department_id
        description: "Identificador único del departamento (PK)"
        tests:
          - not_null
          - unique
      - name: name
        description: "Nombre del departamento (ej. Engineering, Sales)"
        tests:
          - not_null
      - name: group_name
        description: "Grupo funcional al que pertenece el departamento (ej. Research and Development)"
        tests:
          - not_null
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
      - name: _source_entity
        description: '{{ doc("col_source_entity") }}'
      - name: _pipeline_name
        description: '{{ doc("col_pipeline_name") }}'
      - name: _batch_id
        description: '{{ doc("col_batch_id") }}'
      - name: _raw_hash
        description: '{{ doc("col_raw_hash") }}'
      - name: _is_deleted
        description: '{{ doc("col_is_deleted") }}'
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null
