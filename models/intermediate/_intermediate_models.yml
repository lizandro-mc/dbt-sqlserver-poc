version: 2

# =============================================================================
# DATA CONTRACTS — Capa Intermedia
#
# Modelos de enriquecimiento, deduplicación, surrogate keys y protección PII.
# Permanecen en SQL Server local — no se replican a Azure Fabric.
#
# Bóvedas PII (tags: pii_vault, restricted, local_only):
#   int_pii_vault_customers  — recuperar PII de clientes desde Azure
#   int_pii_vault_employees  — recuperar PII de empleados desde Azure
#
# Ver: doc("pii_strategy") para guía completa de uso de bóvedas.
# =============================================================================

models:

  # ---------------------------------------------------------------------------
  # int_customers
  # ---------------------------------------------------------------------------

  - name: int_customers
    description: '{{ doc("int_customers") }}'
    meta:
      owner: data-engineering
      contains_pii: true
      pii_fields: [full_name, email_address, phone]
      access: internal
    columns:
      - name: customer_sk
        description: '{{ doc("col_customer_sk") }}'
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Identificador natural del cliente (PK del sistema CRM)"
        tests:
          - not_null
          - unique
      - name: account_number
        description: "Número de cuenta del cliente en el sistema CRM"
        tests:
          - not_null
      - name: full_name
        description: "[PII] Nombre completo normalizado: UPPER(LTRIM(RTRIM(name))) — solo uso interno en SQL Server"
        meta:
          pii: true
          classification: confidential
      - name: email_address
        description: "[PII] Email normalizado: LOWER(LTRIM(RTRIM(email_address))) — solo uso interno"
        meta:
          pii: true
          classification: confidential
      - name: phone
        description: "[PII] Teléfono del cliente — solo uso interno"
        meta:
          pii: true
          classification: confidential
      - name: full_name_hash
        description: "Hash SHA2_256 del nombre normalizado (UPPER). Para verificación interna — NO comparar con az_customers (que usa valor raw)"
        tests:
          - not_null
        meta:
          pii: false
      - name: email_address_hash
        description: "Hash SHA2_256 del email normalizado (LOWER). Para verificación interna"
        tests:
          - not_null
        meta:
          pii: false
      - name: phone_hash
        description: "Hash SHA2_256 del teléfono"
        meta:
          pii: false
      - name: city
        description: "Ciudad del cliente (de az_addresses, no PII)"
        tests:
          - not_null
      - name: country_region
        description: "País o región del cliente (no PII)"
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  # int_employees
  # ---------------------------------------------------------------------------

  - name: int_employees
    description: '{{ doc("int_employees") }}'
    meta:
      owner: data-engineering
      contains_pii: true
      pii_fields: [national_id_number, login_id, birth_date]
      access: internal
    columns:
      - name: employee_sk
        description: '{{ doc("col_employee_sk") }}'
        tests:
          - not_null
          - unique
      - name: business_entity_id
        description: "Identificador natural del empleado (PK del sistema RRHH)"
        tests:
          - not_null
          - unique
      - name: national_id_number
        description: "[PII] Número de identificación nacional — solo uso interno"
        meta:
          pii: true
          classification: restricted
      - name: login_id
        description: "[PII] Login de dominio del empleado — solo uso interno"
        meta:
          pii: true
          classification: confidential
      - name: birth_date
        description: "[PII] Fecha de nacimiento — solo uso interno"
        meta:
          pii: true
          classification: restricted
      - name: national_id_hash
        description: '{{ doc("col_pii_hash_national_id") }}'
        tests:
          - not_null
        meta:
          pii: false
      - name: login_id_hash
        description: '{{ doc("col_pii_hash_login") }}'
        tests:
          - not_null
        meta:
          pii: false
      - name: birth_date_hash
        description: '{{ doc("col_pii_hash_birth_date") }}'
        tests:
          - not_null
        meta:
          pii: false
      - name: job_title
        description: "Título del cargo (no PII)"
        tests:
          - not_null
      - name: hire_date
        description: "Fecha de contratación del empleado"
        tests:
          - not_null
      - name: marital_status
        description: "Estado civil: M=Married, S=Single"
        tests:
          - accepted_values:
              arguments:
                values: ['M', 'S']
              config:
                severity: warn
      - name: gender
        description: "Género: M=Male, F=Female"
        tests:
          - accepted_values:
              arguments:
                values: ['M', 'F']
              config:
                severity: warn
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  # int_orders
  # ---------------------------------------------------------------------------

  - name: int_orders
    description: '{{ doc("int_orders") }}'
    meta:
      owner: data-engineering
      contains_pii: false
    columns:
      - name: sales_order_id
        description: "FK a la cabecera de orden (parte de clave compuesta)"
        tests:
          - not_null
      - name: sales_order_detail_id
        description: "Identificador de la línea de detalle (parte de clave compuesta)"
        tests:
          - not_null
      - name: customer_sk
        description: '{{ doc("col_customer_sk") }}'
      - name: customer_id
        description: "ID natural del cliente — sin PII, es clave entera de sistema"
        tests:
          - not_null
      - name: order_date
        description: "Fecha en que se realizó la orden"
        tests:
          - not_null
      - name: due_date
        description: "Fecha de vencimiento comprometida"
      - name: ship_date
        description: "Fecha real de envío"
      - name: status
        description: "Estado de la orden: 1=In Process, 2=Approved, 3=Backordered, 4=Rejected, 5=Shipped, 6=Cancelled"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5, 6]
              config:
                severity: warn
      - name: online_order_flag
        description: "1=orden online, 0=presencial"
      - name: product_id
        description: "FK al producto ordenado"
        tests:
          - not_null
      - name: special_offer_id
        description: "FK a oferta especial (0 si no aplica)"
      - name: order_qty
        description: "Cantidad de unidades ordenadas"
        tests:
          - not_null
      - name: unit_price
        description: "Precio unitario sin descuento"
        tests:
          - not_null
      - name: unit_price_discount
        description: "Porcentaje de descuento (0.0 a 1.0)"
      - name: line_total
        description: "Total de línea reportado por el sistema fuente"
        tests:
          - not_null
      - name: line_total_net
        description: "Total neto calculado: order_qty × unit_price × (1 - unit_price_discount)"
      - name: discount_amount
        description: "Monto de descuento aplicado en la línea: order_qty × unit_price × unit_price_discount"
      - name: sub_total
        description: "Subtotal de la orden (de cabecera, mismo para todas las líneas de la orden)"
      - name: total_due
        description: "Total a cobrar de la orden (de cabecera)"
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
        tests:
          - not_null
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  # int_pii_vault_customers — RESTRINGIDO — solo SQL Server local
  # ---------------------------------------------------------------------------

  - name: int_pii_vault_customers
    description: '{{ doc("int_pii_vault_customers") }}'
    meta:
      owner: data-engineering
      access: restricted
      environment: local_only
      pii_vault: true
      never_export: true
    columns:
      - name: customer_sk
        description: '{{ doc("col_customer_sk") }}'
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Clave de negocio — vinculación con az_customers.customer_id"
        tests:
          - not_null
          - unique
      - name: account_number
        description: "Número de cuenta del cliente"
      - name: name
        description: "[PII] Nombre del cliente en claro — valor RAW de staging"
        meta:
          pii: true
          classification: restricted
      - name: email_address
        description: "[PII] Email del cliente en claro — valor RAW de staging"
        meta:
          pii: true
          classification: restricted
      - name: phone
        description: "[PII] Teléfono del cliente en claro — valor RAW de staging"
        meta:
          pii: true
          classification: restricted
      - name: full_name_hash
        description: '{{ doc("col_pii_hash_name") }}'
        tests:
          - not_null
        meta:
          pii: false
      - name: email_address_hash
        description: '{{ doc("col_pii_hash_email") }}'
        tests:
          - not_null
        meta:
          pii: false
      - name: phone_hash
        description: '{{ doc("col_pii_hash_phone") }}'
        meta:
          pii: false
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'

  # ---------------------------------------------------------------------------
  # int_pii_vault_employees — RESTRINGIDO — solo SQL Server local
  # ---------------------------------------------------------------------------

  - name: int_pii_vault_employees
    description: '{{ doc("int_pii_vault_employees") }}'
    meta:
      owner: data-engineering
      access: restricted
      environment: local_only
      pii_vault: true
      never_export: true
    columns:
      - name: employee_sk
        description: '{{ doc("col_employee_sk") }}'
        tests:
          - not_null
          - unique
      - name: business_entity_id
        description: "Clave de negocio — vinculación con az_employees.business_entity_id"
        tests:
          - not_null
          - unique
      - name: national_id_number
        description: "[PII] Número de identificación nacional en claro — valor RAW"
        meta:
          pii: true
          classification: restricted
      - name: login_id
        description: "[PII] Login de dominio en claro — valor RAW"
        meta:
          pii: true
          classification: restricted
      - name: birth_date
        description: "[PII] Fecha de nacimiento en claro — valor RAW"
        meta:
          pii: true
          classification: restricted
      - name: national_id_hash
        description: '{{ doc("col_pii_hash_national_id") }}'
        tests:
          - not_null
        meta:
          pii: false
      - name: login_id_hash
        description: '{{ doc("col_pii_hash_login") }}'
        tests:
          - not_null
        meta:
          pii: false
      - name: birth_date_hash
        description: '{{ doc("col_pii_hash_birth_date") }}'
        tests:
          - not_null
        meta:
          pii: false
      - name: job_title
        description: "Título del cargo (no PII)"
      - name: marital_status
        description: "Estado civil: M=Married, S=Single"
      - name: gender
        description: "Género: M=Male, F=Female"
      - name: hire_date
        description: "Fecha de contratación"
      - name: salaried_flag
        description: "1=asalariado, 0=por horas"
      - name: vacation_hours
        description: "Horas de vacaciones disponibles"
      - name: sick_leave_hours
        description: "Horas de licencia por enfermedad disponibles"
      - name: _ingested_at
        description: '{{ doc("col_ingested_at") }}'
      - name: _source_system
        description: '{{ doc("col_source_system") }}'
      - name: _dbt_loaded_at
        description: '{{ doc("col_dbt_loaded_at") }}'
