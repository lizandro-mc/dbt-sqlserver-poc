name: dbt_sqlserver_poc
version: "1.0.0"
config-version: 2

profile: dbt_sqlserver_poc

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Variables globales del proyecto
# Se acceden con {{ var('nombre_variable') }} en modelos y macros
vars:
  # Ambiente activo (dev, staging, prod)
  env: dev
  # Fecha de inicio para filtros historicos (util en modelos incrementales)
  # Uso: {{ var('start_date') }} en modelos SQL
  start_date: "2011-01-01"

models:
  dbt_sqlserver_poc:
    staging:
      +materialized: view
      +schema: staging
      +tags:
        - staging
        - stg

    intermediate:
      +materialized: view
      +schema: intermediate
      +tags:
        - intermediate
        - int
      # Modelos de boveda PII — permanecen en SQL Server local, NUNCA en Azure
      int_pii_vault_customers:
        +tags:
          - pii_vault
          - restricted
          - local_only
      int_pii_vault_employees:
        +tags:
          - pii_vault
          - restricted
          - local_only

    azure_fabric:
      +materialized: table
      +schema: azure_fabric
      +tags:
        - azure
        - az

# Configuracion de Seeds
seeds:
  dbt_sqlserver_poc:
    +schema: seeds
    +tags:
      - seeds
      - reference

# Configuracion de Snapshots (SCD Type 2)
snapshots:
  dbt_sqlserver_poc:
    +tags:
      - snapshots
      - scd_type_2
